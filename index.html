<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodizim OS | Multi-Device Architect</title>
    <style>
        :root { --gemini: #4285f4; --neon: #00f2ff; --bg: #050505; --text: #39ff14; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; height: 100vh; overflow: hidden; }

        /* شاشة الإقلاع - متجاوبة */
        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 1000; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .logo-symbol { font-size: 15vw; color: var(--neon); text-shadow: 0 0 20px var(--neon); }
        .dev-name { font-size: 1.5rem; color: white; letter-spacing: 5px; margin-top: 10px; }

        /* الواجهة الرئيسية - Responsive Flex */
        #main-ui { display: none; width: 100%; height: 100%; flex-direction: row; }
        
        /* منطقة العرض */
        #display-area { flex: 1; background: #fff; position: relative; min-height: 50%; }
        iframe { width: 100%; height: 100%; border: none; }

        /* لوحة التحكم */
        #control-panel { width: 400px; background: #0d0d0d; border-left: 1px solid #222; display: flex; flex-direction: column; padding: 15px; z-index: 10; }

        /* تعديلات الموبايل */
        @media (max-width: 850px) {
            #main-ui { flex-direction: column-reverse; }
            #control-panel { width: 100%; height: 45%; border-left: none; border-top: 2px solid #222; }
            #display-area { height: 55%; }
            .logo-symbol { font-size: 80px; }
        }

        .log-box { flex: 1; background: #000; border: 1px solid #222; padding: 10px; font-size: 11px; color: #666; overflow-y: auto; margin-bottom: 10px; border-radius: 5px; }
        textarea { background: #111; border: 1px solid #333; color: var(--neon); padding: 12px; border-radius: 8px; resize: none; outline: none; font-size: 14px; width: 100%; }
        button { background: var(--gemini); color: white; border: none; padding: 15px; margin-top: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div id="boot-screen">
    <div id="boot-logs" style="position: absolute; top: 20px; left: 20px; text-align: left; font-size: 12px;"></div>
    <div id="identity" style="display:none;">
        <div class="logo-symbol">◈</div>
        <div class="dev-name">ABDALLAH EKRAM</div>
        <div style="color: var(--gemini); margin-top: 5px;">THE ARCHITECT OS</div>
    </div>
</div>

<div id="main-ui">
    <div id="display-area">
        <iframe id="output-frame"></iframe>
    </div>
    <div id="control-panel">
        <div class="log-box" id="system-logs"></div>
        <textarea id="ai-prompt" rows="3" placeholder="اكتب فكرتك البرمجية هنا..."></textarea>
        <button id="deploy-btn" onclick="deployCode()">تـنـفـيـذ (DEPLOY)</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyAu5rFNBVBwFADl3APDJ8v7O-xuWeQfhmw";

    // تسلسل الإقلاع
    window.onload = async () => {
        const logs = ["> Initializing OS...", "> Linking API...", "> Profile: Abdallah...", "> System Ready."];
        const logBox = document.getElementById('boot-logs');
        for (let t of logs) {
            logBox.innerHTML += `<div>${t}</div>`;
            await new Promise(r => setTimeout(r, 400));
        }
        document.getElementById('identity').style.display = 'block';
        await new Promise(r => setTimeout(r, 2000));
        document.getElementById('boot-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        addSystemLog("Welcome, Architect.");
    };

    async function deployCode() {
        const btn = document.getElementById('deploy-btn');
        const prompt = document.getElementById('ai-prompt').value;
        if (!prompt) return;

        btn.disabled = true;
        btn.innerText = "PROCESSING...";
        addSystemLog(`Syncing with Neural Link...`);

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Write raw HTML/CSS/JS for: ${prompt}. No markdown code blocks, no explanations. Just the code.` }] }]
                })
            });

            const data = await response.json();

            // حل مشكلة الخطأ: فحص استجابة الـ API
            if (data.error) {
                throw new Error(`API Error: ${data.error.message}`);
            }

            let rawCode = data.candidates[0].content.parts[0].text;
            
            // تنظيف الكود من أي علامات Markdown قد تسبب الخطأ
            const cleanCode = rawCode.replace(/```html|```javascript|```css|```/g, '').trim();

            const frame = document.getElementById('output-frame');
            const doc = frame.contentDocument || frame.contentWindow.document;
            doc.open();
            doc.write(cleanCode);
            doc.close();

            addSystemLog("Deployment Successful.");
        } catch (err) {
            console.error(err);
            // حل مشكلة الخطأ: إظهار السبب الحقيقي في الـ Log
            addSystemLog(`CRITICAL ERROR: ${err.message}`);
        } finally {
            btn.disabled = false;
            btn.innerText = "تـنـفـيـذ (DEPLOY)";
        }
    }

    function addSystemLog(msg) {
        const box = document.getElementById('system-logs');
        box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
