<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodizim OS | The Architect</title>
    <style>
        :root { --gemini: #4285f4; --neon: #00f2ff; --bg: #050505; --text: #39ff14; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; height: 100vh; overflow: hidden; }

        /* شاشة الإقلاع */
        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 1000; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #boot-logs { align-self: flex-start; font-size: 14px; color: var(--text); }
        #identity { display: none; text-align: center; margin-top: 20px; animation: glow 2s infinite alternate; }
        .logo-symbol { font-size: 100px; color: var(--neon); text-shadow: 0 0 30px var(--neon); }
        .dev-name { font-size: 28px; color: white; letter-spacing: 8px; margin-top: 10px; font-weight: bold; }

        /* الواجهة الرئيسية */
        #main-ui { display: none; width: 100%; height: 100%; flex-direction: row; }
        #control-panel { width: 420px; background: #0d0d0d; border-left: 1px solid #222; display: flex; flex-direction: column; padding: 20px; z-index: 10; }
        #display-area { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* العناصر التفاعلية */
        .log-box { flex: 1; background: #000; border: 1px solid #222; padding: 10px; font-size: 11px; color: #555; overflow-y: auto; margin-bottom: 15px; border-radius: 5px; }
        textarea { background: #111; border: 1px solid #333; color: var(--neon); padding: 15px; border-radius: 8px; resize: none; outline: none; font-family: inherit; }
        button { background: var(--gemini); color: white; border: none; padding: 15px; margin-top: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        @keyframes glow { from { opacity: 0.8; } to { opacity: 1; text-shadow: 0 0 40px var(--neon); } }
    </style>
</head>
<body>

<div id="boot-screen">
    <div id="boot-logs"></div>
    <div id="identity">
        <div class="logo-symbol">◈</div>
        <div class="dev-name">ABDALLAH EKRAM</div>
        <div style="color: var(--gemini); margin-top: 5px; letter-spacing: 2px;">THE ARCHITECT OS MAPPED</div>
    </div>
</div>

<div id="main-ui">
    <div id="display-area">
        <iframe id="output-frame"></iframe>
    </div>
    <div id="control-panel">
        <h2 style="color:var(--neon); font-size: 18px; margin-bottom: 5px;">COMMAND CENTER</h2>
        <p style="font-size: 10px; color: #444; margin-bottom: 15px;">STATUS: CONNECTED TO GEMINI FLASH 1.5</p>
        
        <div class="log-box" id="system-logs"></div>
        
        <textarea id="ai-prompt" rows="6" placeholder="اكتب فكرتك هنا ليقوم النظام ببنائها..."></textarea>
        <button onclick="deployCode()">تـنـفـيـذ الأمـر (DEPLOY)</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyAu5rFNBVBwFADl3APDJ8v7O-xuWeQfhmw";
    
    // محاكاة الإقلاع
    async function startSystem() {
        const bootLogs = document.getElementById('boot-logs');
        const lines = [
            "> Initializing Kodizim Core...",
            "> Loading User Profile: Abdallah Ekram",
            "> Connecting to Neural Network...",
            "> API Gateway: Secure",
            "> System Check: All Green",
            "> Access Granted."
        ];

        for (let line of lines) {
            let div = document.createElement('div');
            bootLogs.appendChild(div);
            for (let char of line) {
                div.textContent += char;
                await new Promise(r => setTimeout(r, 20));
            }
            await new Promise(r => setTimeout(r, 200));
        }

        document.getElementById('identity').style.display = 'block';
        await new Promise(r => setTimeout(r, 2500));

        document.getElementById('boot-screen').style.opacity = '0';
        document.getElementById('boot-screen').style.transition = '0.8s';
        
        setTimeout(() => {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            addSystemLog("System Ready. Waiting for input...");
        }, 800);
    }

    async function deployCode() {
        const prompt = document.getElementById('ai-prompt').value;
        if (!prompt) return;

        addSystemLog(`Processing prompt: ${prompt}`);
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Generate ONLY raw HTML/CSS/JS code for: ${prompt}. No markdown, no talk, just code.` }] }]
                })
            });

            const data = await response.json();
            let code = data.candidates[0].content.parts[0].text;
            code = code.replace(/```html|```javascript|```css|```/g, '').trim();

            const frame = document.getElementById('output-frame');
            const doc = frame.contentDocument || frame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();

            addSystemLog("Code injected successfully.");
        } catch (err) {
            addSystemLog("Critical Error in Neural Link.");
        }
    }

    function addSystemLog(msg) {
        const box = document.getElementById('system-logs');
        box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    window.onload = startSystem;
</script>
</body>
</html>
